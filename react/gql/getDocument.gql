query GetDocuments(
    $acronym: String, 
    $fields: [String], 
    $where: String,
    $pageSize: Int,
    $page: Int) 
    @context(provider: "vtex.store-graphql", scope: "PRIVATE", login: "true"){
  documents(
    acronym: $acronym, 
    fields: $fields, 
    where: $where,
    pageSize: $pageSize,
    page: $page,
  ) {
    fields {
      key
      value
    }
  }
}